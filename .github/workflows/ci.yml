name: CI
on:
  push: { branches: [main] }
  pull_request:
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Lex
        run: |
          set -euo pipefail
          # lex 0.9.10's stricter flat-layout check once rejected lex-trail's
          # `path = "."` self-dep when pulled as a git dep ("flat layout can only
          # hold one copy"). Resolved upstream by lex-trail#11 (self-dep removed,
          # in-tree imports use relative paths), so 0.9.10 `lex pkg install` now
          # resolves the full closure cleanly. The code requires lex 0.9.7 (lex.toml).
          V=0.9.12; T=x86_64-unknown-linux-gnu
          curl -fsSL "https://github.com/alpibrusl/lex-lang/releases/download/v$V/lex-v$V-$T.tar.gz" -o /tmp/lex.tgz
          tar -xzf /tmp/lex.tgz -C /tmp
          echo "/tmp/lex-v$V-$T" >> "$GITHUB_PATH"
      - run: lex pkg install
      - name: check
        run: |
          set -euo pipefail
          for f in $(find src -name '*.lex'); do lex check "$f" >/dev/null; done
          # Examples too. The adversarial demos are MEANT to be rejected by the
          # effect/isolation checker ("WILL NOT COMPILE. That is the point."), so
          # a file tagged that way MUST fail; every other example MUST pass.
          for f in $(find examples -name '*.lex'); do
            if grep -q "WILL NOT COMPILE" "$f"; then
              if lex check "$f" >/dev/null 2>&1; then echo "FAIL: $f is tagged WILL NOT COMPILE but type-checked"; exit 1; fi
              echo "ok (expected-reject): $f"
            else
              lex check "$f" >/dev/null || { echo "FAIL: $f"; exit 1; }
              echo "ok: $f"
            fi
          done
      - name: fmt
        run: lex fmt --check src tests
      - name: test
        run: lex test --allow-effects io,time,crypto,random,sql,fs_read,fs_write,net,concurrent,llm,proc tests/
      - name: ACLI surface (introspect is valid JSON; skill emits frontmatter)
        run: |
          set -euo pipefail
          python3 -c "import json,sys; d=json.load(sys.stdin); names=[s['name'] for s in d['subcommands']]; assert names==['episodes','verify'], names; print('introspect ok:', names)" < <(cli/arena introspect --output json)
          cli/arena skill | head -1 | grep -q '^---$' || { echo "FAIL: skill must emit SKILL.md frontmatter"; exit 1; }
          echo "ACLI GREEN"
